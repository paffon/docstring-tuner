# Default configuration for docstring-tuner.
# Override any subset by passing --config path/to/your.toml to the dt-* commands.
# Values here mirror the defaults in src/docstring_tuner/config.py.

[model]
base_model_id = "Qwen/Qwen2.5-1.5B-Instruct"
max_new_tokens = 256

[data]
dataset_id = "Nan-Do/code-search-net-python"
n_train = 1500
n_test = 200
max_source_chars = 1200      # skip functions whose source is longer than this
min_docstring_chars = 40     # skip trivial one-line docstrings
seed = 13

[train]
output_dir = "artifacts/run"
adapter_dir = "artifacts/adapter"
lora_r = 16
lora_alpha = 32
lora_dropout = 0.05
learning_rate = 2e-4
num_train_epochs = 1
per_device_train_batch_size = 2
gradient_accumulation_steps = 4
max_length = 768

[eval]
judge_backend = "auto"       # auto | claude_cli | openai | mock
judge_model = "haiku"        # model name/alias passed to the judge backend
